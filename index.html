<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="pt-br" xml:lang="pt-br">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=5" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Stream</title>
  <style type="text/css">
    /* Reset basico sem propriedades modernas */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
    }

    /* Sem uso de: inset, aspect-ratio, gap, grid, flexbox moderno */
    .wrap {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      overflow: hidden;
    }

    /* iframe com posicionamento absoluto classico */
    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background-color: #000000;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe
      id="yt-live"
      title="YouTube Live"
      src="https://www.youtube-nocookie.com/embed/live_stream?channel=UCNZCKDhAVtbh7sddChTxI7w&amp;autoplay=1&amp;mute=1&amp;fs=1"
      frameborder="0"
      scrolling="no"
      allowfullscreen="allowfullscreen"
      webkitallowfullscreen="webkitallowfullscreen"
      mozallowfullscreen="mozallowfullscreen"
    ></iframe>
  </div>
</body>
</html>
